<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feniks Cinema Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff5722;
            --primary-glow: rgba(255, 87, 34, 0.8);
            --glass: rgba(20, 20, 25, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: #050505; color: #fff; overflow: hidden; }
        ::-webkit-scrollbar { display: none; }

        /* 🌌 DINAMIK KOINOT FON */
        .universe-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            z-index: -3;
        }
        .stars {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)), 
                              radial-gradient(2px 2px at 100px 150px, #fff, rgba(0,0,0,0));
            background-repeat: repeat; background-size: 200px 200px;
            animation: twinkle 4s infinite alternate; z-index: -2;
        }
        @keyframes twinkle { from { opacity: 0.3; } to { opacity: 1; } }

        /* 📖 SLIDER */
        #sliderContainer { display: flex; width: 100vw; height: 100vh; overflow-x: scroll; scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        .slide { min-width: 100vw; height: 100vh; scroll-snap-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }

        /* 🧊 PROFIL KARTASI */
        .profile-card { 
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 30px; border-radius: 35px; 
            width: 100%; max-width: 340px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        }
        .user-name { font-size: 30px; font-weight: 900; margin-bottom: 5px; color: #fff; text-shadow: 0 0 20px var(--primary); }
        .balance-box { background: rgba(0,0,0,0.5); padding: 20px; border-radius: 25px; margin-top: 20px; border: 1px solid var(--primary); }
        .balance-box p { font-size: 24px; font-weight: 900; color: #4caf50; }

        /* 🎬 MOVIE CARD (Cinema Style) */
        .movie-card { width: 100%; max-width: 320px; position: relative; border-radius: 30px; overflow: hidden; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        .movie-poster { width: 100%; height: 420px; object-fit: cover; filter: brightness(0.6); transition: 0.5s; }
        .movie-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 25px; background: linear-gradient(transparent, rgba(0,0,0,1)); }
        .movie-title { font-size: 26px; font-weight: 900; margin-bottom: 8px; color: #fff; }
        
        .watch-btn {
            background: linear-gradient(90deg, #ff5722, #d84315); color: #fff; border: none; padding: 15px; 
            border-radius: 20px; font-weight: 900; cursor: pointer; width: 100%; font-size: 16px;
            box-shadow: 0 10px 25px var(--primary-glow); display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        .hint-text { margin-top: 25px; font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 3px; text-transform: uppercase; animation: float 2s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    </style>
</head>
<body>

    <div class="universe-bg"></div>
    <div class="stars"></div>

    <div id="sliderContainer">
        
        <div class="slide">
            <div class="profile-card">
                <div style="font-size: 85px; margin-bottom: 10px; filter: drop-shadow(0 0 20px var(--primary));">🐦‍🔥</div>
                <h2 class="user-name" id="userName">Shohruxxon</h2>
                <div style="background: var(--primary); color: #fff; display: inline-block; padding: 4px 15px; border-radius: 10px; font-size: 10px; font-weight: 800; margin-bottom: 15px;" id="userRole">REJISSYOR</div>
                
                <div class="balance-box">
                    <h3 style="font-size: 10px; color: #aaa; text-transform: uppercase; margin-bottom: 5px;">Sizning joriy balansingiz</h3>
                    <p id="userBalance">0 UZS</p>
                </div>
                <div style="margin-top: 15px; color: #ff9800; font-weight: 900; font-size: 18px;" id="userLevel">LVL 1 🌟</div>
            </div>
            <div class="hint-text">Loyihalarni tomosha qilish ➔</div>
        </div>

        <div class="slide">
            <div class="movie-card">
                <img src="https://images.unsplash.com/photo-1577640905050-83665af216b9?q=80&w=1000" class="movie-poster">
                <div class="movie-info">
                    <h2 class="movie-title">Looney Tunes</h2>
                    <p style="font-size: 13px; margin-bottom: 18px; color: #bbb;">S01E04: Quvnoq sarguzashtlar davom etadi.</p>
                    <button class="watch-btn" onclick="openTelegramVideo('3634886616/47')">
                        <span>▶</span> TOMOSHA QILISH
                    </button>
                </div>
            </div>
        </div>

        <div class="slide">
            <div class="movie-card">
                <img src="https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=1000" class="movie-poster">
                <div class="movie-info">
                    <h2 class="movie-title">Gravity Falls</h2>
                    <p style="font-size: 13px; margin-bottom: 18px; color: #bbb;">Bill Cipher va sirlar dunyosi.</p>
                    <button class="watch-btn" onclick="openTelegramVideo('Kanal_ID/Video_ID')">
                        <span>▶</span> TOMOSHA QILISH
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Telegramdan kelgan ma'lumotlarni o'qish
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('userName').innerText = urlParams.get('name') || 'Shohruxxon';
        document.getElementById('userBalance').innerText = parseInt(urlParams.get('balance') || '0').toLocaleString('uz-UZ') + ' UZS';
        document.getElementById('userLevel').innerText = 'LVL ' + (urlParams.get('level') || '1') + ' 🌟';
        document.getElementById('userRole').innerText = (urlParams.get('role') || 'AKTYOR').toUpperCase();

        // 🎬 Telegramdagi yopiq kanal videosini ochish funksiyasi
        function openTelegramVideo(videoPath) {
            // Yopiq kanal videolarini ochish uchun Telegram rasmiy ssilkasi
            const videoLink = `https://t.me/c/${videoPath}`;
            Telegram.WebApp.openTelegramLink(videoLink);
        }

        // WebApp-ni to'liq ekranga yoyish
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
    </script>
</body>
</html>
