<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐦‍🔥 Feniks Cinema Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid #e94560;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #e94560;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        .header p {
            color: #0f3460;
            font-weight: 600;
            margin-top: 5px;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .profile-info {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e94560, #0f3460);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
        }

        .user-details h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .user-details p {
            color: #a0a0a0;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-box {
            background: rgba(233, 69, 96, 0.2);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-box .value {
            font-size: 22px;
            font-weight: 700;
            color: #e94560;
        }

        .stat-box .label {            font-size: 12px;
            color: #a0a0a0;
            margin-top: 5px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #e94560;
        }

        .project-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-5px);
            border-color: #e94560;
        }

        .project-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .project-card h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .project-card p {
            color: #a0a0a0;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560, #0f3460);
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            margin-top: 10px;
        }

        .loading {
            text-align: center;
            padding: 50px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #e94560;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: 600;            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .notification.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="notification" id="notification"></div>

    <div class="header">
        <h1>🐦‍🔥 FENIKS CINEMA ELITE</h1>
        <p>Professional Dublyaj Studiyasi</p>
    </div>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Ma'lumotlar yuklanmoqda...</p>
    </div>

    <div id="content" style="display: none;">
        <!-- Profile Card -->
        <div class="profile-card">
            <div class="profile-info">
                <div class="avatar" id="avatar">👤</div>
                <div class="user-details">
                    <h2 id="username">Yuklanmoqda...</h2>
                    <p id="role">Lavozim</p>
                </div>
            </div>
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="value" id="balance">0</div>
                    <div class="label">💰 Balans (so'm)</div>
                </div>
                <div class="stat-box">
                    <div class="value" id="level">1</div>
                    <div class="label">🌟 Level</div>
                </div>
                <div class="stat-box">
                    <div class="value" id="xp">0</div>
                    <div class="label">🔥 XP</div>
                </div>
                <div class="stat-box">
                    <div class="value" id="projects">0</div>
                    <div class="label">🎬 Loyihalar</div>
                </div>            </div>
        </div>

        <!-- Projects Section -->
        <h3 class="section-title">📁 Meneda Loyihalar</h3>
        <div id="projects-list"></div>

        <!-- Actions -->
        <button class="btn btn-primary" onclick="submitWork()">🎙 Ish Topshirish</button>
        <button class="btn btn-secondary" onclick="openTelegram()">💬 Botga Qaytish</button>
    </div>

    <script>
        // Telegram WebApp init
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // URL parametrlardan ma'lumot olish
        const urlParams = new URLSearchParams(window.location.search);
        const userData = {
            name: urlParams.get('name') || 'Foydalanuvchi',
            balance: urlParams.get('balance') || '0',
            level: urlParams.get('level') || '1',
            xp: urlParams.get('xp') || '0',
            role: urlParams.get('role') || 'Aktyor'
        };

        // Loyihalar (Backend dan keladi keyinroq)
        const projects = [
            {
                title: "Gravity Falls",
                episode: "S01E04",
                description: "Bill Cipher va sirlar dunyosi.",
                image: "https://images.unsplash.com/photo-1577640905050-83665af216b9?q=80&w=1000",
                status: "active"
            },
            {
                title: "Looney Tunes",
                episode: "S01E04",
                description: "Quvnoq sarguzashtlar davom etadi.",
                image: "https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=1000",
                status: "active"
            }
        ];

        // Sahifa yuklanganda
        window.onload = function() {
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';                document.getElementById('content').style.display = 'block';
                loadUserData();
                loadProjects();
            }, 1000);
        };

        function loadUserData() {
            document.getElementById('username').textContent = userData.name;
            document.getElementById('role').textContent = userData.role;
            document.getElementById('balance').textContent = formatNumber(userData.balance);
            document.getElementById('level').textContent = userData.level;
            document.getElementById('xp').textContent = formatNumber(userData.xp);
            document.getElementById('avatar').textContent = userData.name.charAt(0).toUpperCase();
            document.getElementById('projects').textContent = projects.length;
        }

        function loadProjects() {
            const container = document.getElementById('projects-list');
            container.innerHTML = '';

            projects.forEach(project => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.innerHTML = `
                    <img src="${project.image}" alt="${project.title}">
                    <h3>${project.title}</h3>
                    <p>${project.episode} - ${project.description}</p>
                    <button class="btn btn-primary" onclick="openProject('${project.title}')">▶ TOMOSHA QILISH</button>
                `;
                container.appendChild(card);
            });
        }

        function formatNumber(num) {
            return parseInt(num).toLocaleString('uz-UZ');
        }

        function submitWork() {
            tg.sendData(JSON.stringify({action: 'submit_work'}));
            showNotification(' Ish topshirish sahifasi ochilmoqda...');
        }

        function openProject(title) {
            tg.sendData(JSON.stringify({action: 'open_project', title: title}));
            showNotification(`🎬 ${project} ochilmoqda...`);
        }

        function openTelegram() {
            tg.close();
        }
        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Telegram ranglariga moslashish
        if (tg.themeParams) {
            document.body.style.background = tg.themeParams.bg_color || '#1a1a2e';
            document.body.style.color = tg.themeParams.text_color || '#ffffff';
        }
    </script>
</body>
</html>
